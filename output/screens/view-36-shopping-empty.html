<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mise — Shopping List</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="mobile-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div class="status-icons">
      <svg class="status-icon" width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5"/><rect x="9" y="3" width="3" height="9" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg class="status-icon" width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="2" stroke="currentColor" stroke-width="1"/><rect x="22" y="3.5" width="2.5" height="5" rx="1" fill="currentColor"/><rect x="2" y="2" width="16" height="8" rx="1.2" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- Page Header -->
  <header class="page-header">
    <button class="page-header-back" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="page-header-title">Shopping List</h1>
    <button class="page-header-cart" aria-label="Shopping cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    </button>
  </header>

  <!-- Empty State -->
  <div style="padding:0 24px 40px;">
    <div class="empty-state" style="padding-top:64px;">
      <!-- Cart icon -->
      <div style="width:96px;height:96px;background:var(--bg-elevated);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </div>

      <div class="empty-title">Your list is empty</div>
      <p class="empty-desc">Add recipes to automatically build your shopping list. mise. handles the quantities and organisation.</p>

      <!-- Divider with "or" -->
      <div style="display:flex;align-items:center;gap:12px;width:100%;margin:8px 0;">
        <div style="flex:1;height:1px;background:var(--border-subtle);"></div>
        <span style="font-size:13px;color:var(--text-3);font-weight:500;">or</span>
        <div style="flex:1;height:1px;background:var(--border-subtle);"></div>
      </div>

      <button class="btn btn-ghost" style="font-size:15px;color:var(--brand);font-weight:500;">
        Chat with mise.
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <!-- Hint text -->
    <p style="text-align:center;font-size:12px;color:var(--text-4);margin-top:32px;line-height:1.5;">Your list updates automatically as you plan meals</p>
  </div>

</div>
</body>
</html>
