receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  file/telemetry:
    path: /output/claude_telemetry.json
    flush_interval: 1s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/telemetry]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/telemetry]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/telemetry]
