<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook — Shopping List by Aisle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            cream: '#FAF8F5',
            primary: '#2D5A3D',
            heading: '#1A1A1A',
            muted: '#6B6B6B',
            greeting: '#8B7355',
            border: '#E8E4DF',
          },
        },
      },
    }
  </script>
  <style>
    *:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(45, 90, 61, 0.75);
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex items-start justify-center bg-[#E8E4DF]">

  <!-- Device Frame -->
  <div class="w-[390px] min-h-screen bg-cream flex flex-col shadow-xl rounded-[40px]">

    <!-- Status Bar Spacer -->
    <div class="h-12 flex-shrink-0"></div>

    <!-- Top Header (sticky) -->
    <header class="sticky top-0 z-30 bg-cream flex items-center justify-between px-4 pb-3 flex-shrink-0">
      <!-- Back Arrow -->
      <button
        type="button"
        aria-label="Back"
        class="h-11 w-11 inline-flex items-center justify-center rounded-full text-heading hover:bg-black/5 active:bg-black/10 active:scale-95 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Center Title -->
      <h1 class="text-lg font-semibold text-heading">Shopping List</h1>

      <!-- Sort Toggle Button -->
      <button
        type="button"
        aria-label="Sort options"
        class="h-11 w-11 inline-flex items-center justify-center rounded-full text-heading hover:bg-black/5 active:bg-black/10 active:scale-95 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="15" y2="12"/>
          <line x1="3" y1="18" x2="9" y2="18"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main aria-label="Shopping list" class="overflow-y-auto flex-1">

      <!-- Sort Toggle Bar -->
      <div class="px-4 pb-3">
        <div
          role="group"
          aria-label="View options"
          class="flex gap-2 p-1 bg-white border border-border rounded-full"
        >
          <!-- By Recipe (inactive) -->
          <button
            type="button"
            aria-pressed="false"
            class="flex-1 min-h-[44px] text-sm font-medium bg-white border border-border text-muted rounded-full hover:bg-black/[0.03] transition-all"
          >
            By Recipe
          </button>

          <!-- By Aisle (active) -->
          <button
            type="button"
            aria-pressed="true"
            class="flex-1 min-h-[44px] text-sm font-semibold bg-primary text-white rounded-full transition-all"
          >
            By Aisle
          </button>
        </div>
      </div>

      <div class="px-4 pb-4">

        <!-- Progress Summary Bar -->
        <div class="mb-5">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-heading">11 of 19 items collected</span>
            <!-- Clear checked pill -->
            <button
              type="button"
              aria-label="Clear all checked items"
              class="inline-flex items-center gap-1 bg-white border border-border text-primary text-xs font-medium rounded-full px-3 py-1.5 hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap"
            >
              <span aria-hidden="true">✕</span> Clear 11 checked
            </button>
          </div>

          <!-- Progress bar -->
          <div
            role="progressbar"
            aria-valuenow="11"
            aria-valuemin="0"
            aria-valuemax="19"
            aria-label="Shopping progress"
            class="w-full h-1.5 bg-border rounded-full overflow-hidden"
          >
            <div
              class="h-full bg-primary rounded-full"
              style="width: calc(11 / 19 * 100%)"
              aria-hidden="true"
            ></div>
          </div>

          <!-- Sub-caption -->
          <p class="text-xs text-muted mt-1.5">8 remaining · Tap to check off items</p>
        </div>

        <!-- ── Aisle Groups ───────────────────────────────────────── -->

        <!-- PRODUCE -->
        <section aria-labelledby="aisle-produce" class="mb-5">
          <h2
            id="aisle-produce"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Produce
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Thai basil leaves (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Thai basil leaves"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Thai basil leaves</span>
                  <span class="block text-xs text-muted mt-0.5">1 cup</span>
                </span>
              </button>
            </li>

            <!-- Red bell pepper (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Red bell pepper"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Red bell pepper</span>
                  <span class="block text-xs text-muted mt-0.5">1, sliced</span>
                </span>
              </button>
            </li>

            <!-- Fresh lime (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Fresh lime"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Fresh lime</span>
                  <span class="block text-xs text-muted mt-0.5">2</span>
                </span>
              </button>
            </li>

            <!-- Cucumber (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Cucumber"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Cucumber</span>
                  <span class="block text-xs text-muted mt-0.5">½, sliced</span>
                </span>
              </button>
            </li>

            <!-- Ripe avocado (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Ripe avocado"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Ripe avocado</span>
                  <span class="block text-xs text-muted mt-0.5">2</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- PROTEINS -->
        <section aria-labelledby="aisle-proteins" class="mb-5">
          <h2
            id="aisle-proteins"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Proteins
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Chicken thigh (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Chicken thigh"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Chicken thigh</span>
                  <span class="block text-xs text-muted mt-0.5">400g, sliced</span>
                </span>
              </button>
            </li>

            <!-- Sushi-grade salmon (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Sushi-grade salmon"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Sushi-grade salmon</span>
                  <span class="block text-xs text-muted mt-0.5">300g</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- DAIRY & SAUCES -->
        <section aria-labelledby="aisle-dairy-sauces" class="mb-5">
          <h2
            id="aisle-dairy-sauces"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Dairy &amp; Sauces
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Coconut milk (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Coconut milk"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Coconut milk</span>
                  <span class="block text-xs text-muted mt-0.5">200ml</span>
                </span>
              </button>
            </li>

            <!-- Fish sauce (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Fish sauce"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Fish sauce</span>
                  <span class="block text-xs text-muted mt-0.5">2 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Soy sauce (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Soy sauce"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Soy sauce</span>
                  <span class="block text-xs text-muted mt-0.5">2 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Sesame oil (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Sesame oil"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Sesame oil</span>
                  <span class="block text-xs text-muted mt-0.5">1 tbsp</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- PANTRY & SPICES -->
        <section aria-labelledby="aisle-pantry-spices" class="mb-5">
          <h2
            id="aisle-pantry-spices"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Pantry &amp; Spices
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Green curry paste (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Green curry paste"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Green curry paste</span>
                  <span class="block text-xs text-muted mt-0.5">3 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Palm sugar (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Palm sugar"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Palm sugar</span>
                  <span class="block text-xs text-muted mt-0.5">1 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Chili flakes (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Chili flakes"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Chili flakes</span>
                  <span class="block text-xs text-muted mt-0.5">to taste</span>
                </span>
              </button>
            </li>

            <!-- Jasmine rice (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Jasmine rice"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Jasmine rice</span>
                  <span class="block text-xs text-muted mt-0.5">2 cups</span>
                </span>
              </button>
            </li>

            <!-- Sushi rice (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Sushi rice"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Sushi rice</span>
                  <span class="block text-xs text-muted mt-0.5">1 cup</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- BAKERY -->
        <section aria-labelledby="aisle-bakery" class="mb-5">
          <h2
            id="aisle-bakery"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Bakery
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Sourdough bread (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Sourdough bread"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Sourdough bread</span>
                  <span class="block text-xs text-muted mt-0.5">2 slices</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- FROZEN / OTHER -->
        <section aria-labelledby="aisle-frozen-other" class="mb-5">
          <h2
            id="aisle-frozen-other"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Frozen / Other
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Edamame (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Edamame"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Edamame</span>
                  <span class="block text-xs text-muted mt-0.5">½ cup</span>
                </span>
              </button>
            </li>

            <!-- Roasted peanuts (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Roasted peanuts"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Roasted peanuts</span>
                  <span class="block text-xs text-muted mt-0.5">3 tbsp</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

      </div>
    </main>

    <!-- Bottom Sticky Bar -->
    <footer class="sticky bottom-0 bg-cream px-4 pb-8 pt-3 flex-shrink-0">

      <!-- Quick Action Chips -->
      <div class="flex gap-2 overflow-x-auto pb-3 scrollbar-hide" role="group" aria-label="Quick actions">
        <button
          type="button"
          aria-label="Clear checked items"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">✓</span> Clear checked
        </button>
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">📤</span> Share list
        </button>
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">🔁</span> Refill
        </button>
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">➕</span> Add item
        </button>
      </div>

      <!-- Chat Input -->
      <form aria-label="Chat input">
        <div
          class="flex items-center gap-2 bg-white border border-border rounded-full px-4 py-2.5 shadow-sm"
          style="transition: box-shadow 0.15s ease;"
          onfocusin="this.style.boxShadow='0 0 0 2px rgba(45,90,61,0.75)'"
          onfocusout="this.style.boxShadow=''"
        >
          <!-- Input Field -->
          <input
            type="text"
            placeholder="What would you like to cook?"
            aria-label="Chat input"
            autocomplete="off"
            class="flex-1 bg-transparent text-sm text-heading placeholder:text-muted/80 outline-none min-w-0"
          >

          <!-- Send Button -->
          <button
            type="submit"
            aria-label="Send message"
            class="h-11 w-11 inline-flex items-center justify-center text-muted hover:text-heading active:scale-95 transition-all flex-shrink-0 rounded-full"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </form>
    </footer>

  </div>

</body>
</html>
