<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook — Shopping List by Recipe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            cream: '#FAF8F5',
            primary: '#2D5A3D',
            heading: '#1A1A1A',
            muted: '#6B6B6B',
            greeting: '#8B7355',
            border: '#E8E4DF',
          },
        },
      },
    }
  </script>
  <style>
    *:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(45, 90, 61, 0.75);
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex items-start justify-center bg-[#E8E4DF]">

  <!-- Device Frame -->
  <div class="w-[390px] min-h-screen bg-cream flex flex-col shadow-xl rounded-[40px]">

    <!-- Status Bar Spacer -->
    <div class="h-12 flex-shrink-0"></div>

    <!-- Top Header (sticky) -->
    <header class="sticky top-0 z-30 bg-cream flex items-center justify-between px-4 pb-3 flex-shrink-0">
      <!-- Back Arrow -->
      <button
        type="button"
        aria-label="Back"
        class="h-11 w-11 inline-flex items-center justify-center rounded-full text-heading hover:bg-black/5 active:bg-black/10 active:scale-95 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Center Title -->
      <h1 class="text-lg font-semibold text-heading">Shopping List</h1>

      <!-- Sort Toggle Button -->
      <button
        type="button"
        aria-label="Sort options"
        class="h-11 w-11 inline-flex items-center justify-center rounded-full text-heading hover:bg-black/5 active:bg-black/10 active:scale-95 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="15" y2="12"/>
          <line x1="3" y1="18" x2="9" y2="18"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main aria-label="Shopping list" class="overflow-y-auto flex-1">

      <!-- Sort Toggle Bar -->
      <div class="px-4 pb-3">
        <div
          role="group"
          aria-label="View options"
          class="flex gap-2 p-1 bg-white border border-border rounded-full"
        >
          <!-- By Recipe (active) -->
          <button
            type="button"
            aria-pressed="true"
            class="flex-1 min-h-[44px] text-sm font-semibold bg-primary text-white rounded-full transition-all"
          >
            By Recipe
          </button>

          <!-- By Aisle (inactive) -->
          <button
            type="button"
            aria-pressed="false"
            class="flex-1 min-h-[44px] text-sm font-medium bg-white border border-border text-muted rounded-full hover:bg-black/[0.03] transition-all"
          >
            By Aisle
          </button>
        </div>
      </div>

      <div class="px-4 pb-4">

        <!-- Cooking Plan Section -->
        <section aria-labelledby="cooking-plan-heading" class="mb-5">
          <h2
            id="cooking-plan-heading"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-3"
          >
            Cooking Plan
          </h2>

          <ul class="flex flex-col gap-2">

            <!-- Recipe 1: Thai Green Curry (active/selected) -->
            <li>
              <button
                type="button"
                aria-pressed="true"
                aria-current="true"
                aria-label="Thai Green Curry, 8 items, active"
                class="w-full flex items-center gap-3 bg-primary text-white rounded-2xl px-3 py-2.5 hover:bg-primary/90 active:bg-primary/80 active:scale-[0.98] transition-all"
              >
                <!-- Thumbnail -->
                <div
                  aria-hidden="true"
                  class="w-12 h-12 rounded-xl bg-white/20 flex-shrink-0 flex items-center justify-center text-xl"
                >
                  🍛
                </div>

                <!-- Text -->
                <div class="flex-1 text-left min-w-0">
                  <div class="text-sm font-semibold leading-snug text-white">Thai Green Curry</div>
                  <div class="text-xs text-white/70 mt-0.5">8 items</div>
                </div>

                <!-- Active indicator -->
                <span class="text-xs font-semibold text-white/80 flex-shrink-0 mr-0.5">active</span>

                <!-- Chevron -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="flex-shrink-0 text-white/60">
                  <path d="M9 18l6-6-6-6"/>
                </svg>
              </button>
            </li>

            <!-- Recipe 2: Avocado Toast -->
            <li>
              <button
                type="button"
                aria-pressed="false"
                aria-label="Avocado Toast, 5 items"
                class="w-full flex items-center gap-3 bg-white border border-border rounded-2xl px-3 py-2.5 hover:bg-black/[0.03] active:scale-[0.98] transition-all"
              >
                <!-- Thumbnail -->
                <div
                  aria-hidden="true"
                  class="w-12 h-12 rounded-xl bg-[#F0FAF2] flex-shrink-0 flex items-center justify-center text-xl"
                >
                  🥑
                </div>

                <!-- Text -->
                <div class="flex-1 text-left min-w-0">
                  <div class="text-sm font-semibold text-heading leading-snug">Avocado Toast</div>
                  <div class="text-xs text-muted mt-0.5">5 items</div>
                </div>

                <!-- Chevron -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="flex-shrink-0 text-muted">
                  <path d="M9 18l6-6-6-6"/>
                </svg>
              </button>
            </li>

            <!-- Recipe 3: Salmon Poke Bowl -->
            <li>
              <button
                type="button"
                aria-pressed="false"
                aria-label="Salmon Poke Bowl, 6 items"
                class="w-full flex items-center gap-3 bg-white border border-border rounded-2xl px-3 py-2.5 hover:bg-black/[0.03] active:scale-[0.98] transition-all"
              >
                <!-- Thumbnail -->
                <div
                  aria-hidden="true"
                  class="w-12 h-12 rounded-xl bg-[#FFF5F0] flex-shrink-0 flex items-center justify-center text-xl"
                >
                  🍣
                </div>

                <!-- Text -->
                <div class="flex-1 text-left min-w-0">
                  <div class="text-sm font-semibold text-heading leading-snug">Salmon Poke Bowl</div>
                  <div class="text-xs text-muted mt-0.5">6 items</div>
                </div>

                <!-- Chevron -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="flex-shrink-0 text-muted">
                  <path d="M9 18l6-6-6-6"/>
                </svg>
              </button>
            </li>

          </ul>
        </section>

        <!-- ── Ingredient Groups ────────────────────────────────── -->

        <!-- Group: Thai Green Curry -->
        <section aria-labelledby="group-thai-curry" class="mb-5">
          <h2
            id="group-thai-curry"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Thai Green Curry
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Chicken thigh (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Chicken thigh"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <!-- Checkbox -->
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <!-- Text -->
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Chicken thigh</span>
                  <span class="block text-xs text-muted mt-0.5">400g, sliced</span>
                </span>
              </button>
            </li>

            <!-- Coconut milk (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Coconut milk"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <!-- Checkbox checked -->
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <!-- Text (struck through) -->
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Coconut milk</span>
                  <span class="block text-xs text-muted mt-0.5">200ml</span>
                </span>
              </button>
            </li>

            <!-- Fish sauce (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Fish sauce"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Fish sauce</span>
                  <span class="block text-xs text-muted mt-0.5">2 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Green curry paste (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Green curry paste"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Green curry paste</span>
                  <span class="block text-xs text-muted mt-0.5">3 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Thai basil leaves (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Thai basil leaves"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Thai basil leaves</span>
                  <span class="block text-xs text-muted mt-0.5">1 cup</span>
                </span>
              </button>
            </li>

            <!-- Red bell pepper (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Red bell pepper"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Red bell pepper</span>
                  <span class="block text-xs text-muted mt-0.5">1, sliced</span>
                </span>
              </button>
            </li>

            <!-- Fish sauce second entry (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Fish sauce"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Fish sauce</span>
                  <span class="block text-xs text-muted mt-0.5">2 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Jasmine rice (unchecked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Jasmine rice"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Jasmine rice</span>
                  <span class="block text-xs text-muted mt-0.5">for serving</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- Group: Avocado Toast -->
        <section aria-labelledby="group-avocado-toast" class="mb-5">
          <h2
            id="group-avocado-toast"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Avocado Toast
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Sourdough bread -->
            <li>
              <button
                type="button"
                aria-label="Check off Sourdough bread"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Sourdough bread</span>
                  <span class="block text-xs text-muted mt-0.5">2 slices</span>
                </span>
              </button>
            </li>

            <!-- Ripe avocado -->
            <li>
              <button
                type="button"
                aria-label="Check off Ripe avocado"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Ripe avocado</span>
                  <span class="block text-xs text-muted mt-0.5">2</span>
                </span>
              </button>
            </li>

            <!-- Lemon -->
            <li>
              <button
                type="button"
                aria-label="Check off Lemon"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Lemon</span>
                  <span class="block text-xs text-muted mt-0.5">1</span>
                </span>
              </button>
            </li>

            <!-- Cherry tomatoes -->
            <li>
              <button
                type="button"
                aria-label="Check off Cherry tomatoes"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Cherry tomatoes</span>
                  <span class="block text-xs text-muted mt-0.5">handful</span>
                </span>
              </button>
            </li>

            <!-- Chili flakes -->
            <li>
              <button
                type="button"
                aria-label="Check off Chili flakes"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Chili flakes</span>
                  <span class="block text-xs text-muted mt-0.5">to taste</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

        <!-- Group: Salmon Poke Bowl -->
        <section aria-labelledby="group-poke-bowl" class="mb-5">
          <h2
            id="group-poke-bowl"
            class="text-xs font-semibold tracking-widest text-muted uppercase mb-2"
          >
            Salmon Poke Bowl
          </h2>

          <ul class="flex flex-col bg-white border border-border rounded-2xl overflow-hidden divide-y divide-border">

            <!-- Sushi-grade salmon -->
            <li>
              <button
                type="button"
                aria-label="Check off Sushi-grade salmon"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Sushi-grade salmon</span>
                  <span class="block text-xs text-muted mt-0.5">300g</span>
                </span>
              </button>
            </li>

            <!-- Sushi rice -->
            <li>
              <button
                type="button"
                aria-label="Check off Sushi rice"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Sushi rice</span>
                  <span class="block text-xs text-muted mt-0.5">1 cup</span>
                </span>
              </button>
            </li>

            <!-- Soy sauce (checked) -->
            <li>
              <button
                type="button"
                aria-label="Check off Soy sauce"
                aria-pressed="true"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left opacity-60"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-primary bg-primary flex items-center justify-center"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading line-through leading-snug">Soy sauce</span>
                  <span class="block text-xs text-muted mt-0.5">2 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Sesame oil -->
            <li>
              <button
                type="button"
                aria-label="Check off Sesame oil"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Sesame oil</span>
                  <span class="block text-xs text-muted mt-0.5">1 tbsp</span>
                </span>
              </button>
            </li>

            <!-- Cucumber -->
            <li>
              <button
                type="button"
                aria-label="Check off Cucumber"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Cucumber</span>
                  <span class="block text-xs text-muted mt-0.5">½, sliced</span>
                </span>
              </button>
            </li>

            <!-- Edamame -->
            <li>
              <button
                type="button"
                aria-label="Check off Edamame"
                aria-pressed="false"
                class="w-full flex items-center gap-3 px-4 py-3 hover:bg-black/[0.03] active:bg-black/[0.05] transition-colors text-left"
              >
                <span
                  aria-hidden="true"
                  class="w-6 h-6 flex-shrink-0 rounded-md border-2 border-border flex items-center justify-center"
                ></span>
                <span class="flex-1 min-w-0">
                  <span class="block text-sm font-medium text-heading leading-snug">Edamame</span>
                  <span class="block text-xs text-muted mt-0.5">½ cup</span>
                </span>
              </button>
            </li>

          </ul>
        </section>

      </div>
    </main>

    <!-- Bottom Sticky Bar -->
    <footer class="sticky bottom-0 bg-cream px-4 pb-8 pt-3 flex-shrink-0">

      <!-- Quick Action Chips -->
      <div class="flex gap-2 overflow-x-auto pb-3 scrollbar-hide" role="group" aria-label="Quick actions">
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] disabled:opacity-40 disabled:pointer-events-none transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">🛒</span> Go shopping
        </button>
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] disabled:opacity-40 disabled:pointer-events-none transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">➕</span> Add recipe
        </button>
        <button
          type="button"
          disabled
          aria-disabled="true"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] disabled:opacity-40 disabled:pointer-events-none transition-all whitespace-nowrap"
        >
          <span aria-hidden="true">🗑️</span> Clear checked
        </button>
      </div>

      <!-- Chat Input -->
      <form aria-label="Chat input">
        <div
          class="flex items-center gap-2 bg-white border border-border rounded-full px-4 py-2.5 shadow-sm"
          style="transition: box-shadow 0.15s ease;"
          onfocusin="this.style.boxShadow='0 0 0 2px rgba(45,90,61,0.75)'"
          onfocusout="this.style.boxShadow=''"
        >
          <!-- Input Field -->
          <input
            type="text"
            placeholder="What would you like to cook?"
            aria-label="What would you like to cook?"
            autocomplete="off"
            class="flex-1 bg-transparent text-sm text-heading placeholder:text-muted/80 outline-none min-w-0"
          >

          <!-- Send Button -->
          <button
            type="submit"
            aria-label="Send message"
            class="h-11 w-11 inline-flex items-center justify-center text-muted hover:text-heading active:scale-95 transition-all flex-shrink-0 rounded-full"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </form>
    </footer>

  </div>

</body>
</html>
