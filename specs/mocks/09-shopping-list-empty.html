<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook — Shopping List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            cream: '#FAF8F5',
            primary: '#2D5A3D',
            heading: '#1A1A1A',
            muted: '#6B6B6B',
            greeting: '#8B7355',
            border: '#E8E4DF',
          },
        },
      },
    }
  </script>
  <style>
    *:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(45, 90, 61, 0.75);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex items-start justify-center bg-[#E8E4DF]">

  <!-- Device Frame: h-[844px], NO overflow-hidden -->
  <div class="w-[390px] h-[844px] bg-cream flex flex-col shadow-xl rounded-[40px]">

    <!-- Status Bar Spacer -->
    <div class="h-12 flex-shrink-0"></div>

    <!-- Top Header (sticky) -->
    <header class="sticky top-0 z-30 bg-cream flex items-center justify-between px-4 pb-3 flex-shrink-0">
      <!-- Back Arrow: h-11 w-11, aria-label="Back" -->
      <button
        type="button"
        aria-label="Back"
        class="h-11 w-11 inline-flex items-center justify-center rounded-full text-heading hover:bg-black/5 active:bg-black/10 active:scale-95 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Center Title -->
      <h1 class="text-lg font-semibold text-heading">Shopping List</h1>

      <!-- Sort toggle pill -->
      <div
        role="group"
        aria-label="Sort options"
        class="flex p-0.5 bg-white border border-border rounded-full text-xs font-medium"
      >
        <button
          type="button"
          aria-pressed="false"
          class="px-3 h-8 rounded-full text-muted hover:bg-black/[0.03] active:scale-95 transition-all"
        >
          Recipe
        </button>
        <button
          type="button"
          aria-pressed="true"
          class="px-3 h-8 rounded-full bg-primary text-white transition-all"
        >
          Aisle
        </button>
      </div>
    </header>

    <!-- Main Content: flex-1 + overflow-y-auto -->
    <main aria-label="Shopping list" class="flex-1 flex flex-col px-6 overflow-y-auto">

      <!-- Empty State -->
      <div
        class="flex-1 flex flex-col items-center justify-center pt-10 pb-6"
        style="animation: fadeInUp 0.45s ease-out forwards"
      >
        <!-- Illustration Circle: SVG cart icon -->
        <div
          role="img"
          aria-label="Empty shopping list"
          class="w-24 h-24 rounded-full bg-white border border-border flex items-center justify-center shadow-sm"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#2D5A3D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8" cy="21" r="1"/>
            <circle cx="19" cy="21" r="1"/>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
        </div>

        <!-- Heading: h2 per spec -->
        <h2 class="text-xl font-semibold text-heading mt-5">No items yet</h2>

        <!-- Subtext: muted -->
        <p class="text-sm text-muted text-center max-w-[240px] mt-2 leading-relaxed">
          Add recipes to build your shopping list
        </p>

        <!-- Primary CTA: full-width, bg-primary, min-h-[56px] -->
        <button
          type="button"
          class="mt-6 w-full flex items-center justify-center gap-2 bg-primary text-white text-sm font-semibold rounded-full min-h-[56px] px-6 hover:bg-[#244d34] active:bg-[#1e4029] active:scale-[0.97] transition-all"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Browse recipes
        </button>

        <!-- Secondary Text Link -->
        <a
          href="#"
          class="mt-3 text-sm text-primary font-medium hover:underline focus-visible:ring-offset-2 rounded-sm"
        >
          or start from the chat →
        </a>
      </div>

      <!-- How It Works -->
      <section
        aria-labelledby="how-it-works-heading"
        class="pb-6"
        style="animation: fadeInUp 0.45s ease-out 0.15s both"
      >
        <!-- Section heading: h2, not <p> -->
        <h2
          id="how-it-works-heading"
          class="text-sm font-semibold text-muted text-center mt-8 mb-5"
        >
          How it works
        </h2>

        <!-- Steps Row: no role="list" on ul -->
        <ul class="flex items-start justify-center gap-4" aria-label="How it works steps">

          <!-- Step 1 -->
          <li class="flex flex-col items-center gap-2 w-[100px]">
            <div class="w-10 h-10 rounded-full bg-white border border-border flex items-center justify-center text-lg shadow-sm" aria-hidden="true">
              💬
            </div>
            <span class="text-xs font-semibold text-heading">Chat</span>
            <span class="text-xs text-muted text-center leading-snug">Ask AI for recipes</span>
          </li>

          <!-- Step 2 -->
          <li class="flex flex-col items-center gap-2 w-[100px]">
            <div class="w-10 h-10 rounded-full bg-white border border-border flex items-center justify-center text-lg shadow-sm" aria-hidden="true">
              ➕
            </div>
            <span class="text-xs font-semibold text-heading">Add</span>
            <span class="text-xs text-muted text-center leading-snug">Add to your list</span>
          </li>

          <!-- Step 3 -->
          <li class="flex flex-col items-center gap-2 w-[100px]">
            <div class="w-10 h-10 rounded-full bg-white border border-border flex items-center justify-center text-lg shadow-sm" aria-hidden="true">
              🛒
            </div>
            <span class="text-xs font-semibold text-heading">Shop</span>
            <span class="text-xs text-muted text-center leading-snug">Shop by aisle</span>
          </li>

        </ul>
      </section>

    </main>

    <!-- Bottom Input Bar: sticky bottom-0 bg-cream -->
    <footer class="sticky bottom-0 bg-cream px-4 pb-8 pt-3 flex-shrink-0">

      <!-- Quick Action Chips above input: min-h-[44px] each, disabled states -->
      <div class="flex gap-2 overflow-x-auto pb-3 scrollbar-hide" role="group" aria-label="Quick actions">
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed disabled:pointer-events-none"
        >
          <span aria-hidden="true">🍳</span> Start cooking
        </button>
        <button
          type="button"
          class="flex-shrink-0 inline-flex items-center gap-1.5 bg-white border border-border text-sm font-medium text-heading rounded-full px-4 min-h-[44px] hover:bg-black/[0.03] active:scale-[0.97] transition-all whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed disabled:pointer-events-none"
        >
          <span aria-hidden="true">📖</span> Browse recipes
        </button>
      </div>

      <!-- Chat input form: aria-label="Chat input", no role="search" -->
      <form aria-label="Chat input">
        <div
          class="flex items-center gap-2 bg-white border border-border rounded-full px-4 py-2.5 shadow-sm"
          style="transition: box-shadow 0.15s ease;"
          onfocusin="this.style.boxShadow='0 0 0 2px rgba(45,90,61,0.75)'"
          onfocusout="this.style.boxShadow=''"
        >

          <!-- Input Field -->
          <input
            type="text"
            placeholder="What would you like to cook?"
            aria-label="What would you like to cook?"
            autocomplete="off"
            class="flex-1 bg-transparent text-sm text-heading placeholder:text-muted/80 outline-none min-w-0"
          >

          <!-- Search Toggle: h-11 w-11, aria-pressed="false" -->
          <button
            type="button"
            aria-label="Toggle search mode"
            aria-pressed="false"
            class="h-11 w-11 inline-flex items-center justify-center text-muted hover:text-heading active:scale-95 transition-all flex-shrink-0 rounded-full"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>

        </div>
      </form>
    </footer>

  </div>

</body>
</html>
