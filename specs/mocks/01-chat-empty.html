<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook — Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            cream: '#FAF8F5',
            primary: '#2D5A3D',
            heading: '#1A1A1A',
            muted: '#6B6B6B',
            greeting: '#8B7355',
            border: '#E8E4DF',
          },
        },
      },
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex items-start justify-center bg-[#E8E4DF]">

  <!-- Device Frame -->
  <div class="w-[390px] min-h-screen bg-cream relative flex flex-col shadow-xl overflow-hidden">

    <!-- Status Bar Spacer -->
    <div class="h-12 flex-shrink-0"></div>

    <!-- Top Bar -->
    <header class="flex items-center justify-end px-6 pb-2 flex-shrink-0">
      <button type="button" aria-label="Shopping list" class="h-11 w-11 inline-flex items-center justify-center -mr-2 rounded-full text-heading hover:bg-black/5 transition-colors active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1"/>
          <circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col justify-start px-6 pt-16 overflow-y-auto">

      <!-- Greeting -->
      <section class="mb-10" style="animation: fadeInUp 0.5s ease-out forwards">
        <p class="text-greeting text-lg font-light mb-1.5">Hello, Lionel</p>
        <h1 class="text-heading text-3xl leading-tight font-bold">What would you like<br>to cook?</h1>
      </section>

      <!-- Quick Action Bubbles -->
      <nav aria-label="Quick suggestions" class="flex flex-wrap gap-2.5">
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-white border border-border rounded-full text-sm font-medium text-heading hover:shadow-sm hover:border-greeting/40 transition-all active:scale-[0.97] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2" style="opacity:0; animation: fadeInUp 0.4s ease-out forwards; animation-delay: 0.3s">
          <span aria-hidden="true">🍳</span> Quick dinner
        </button>
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-white border border-border rounded-full text-sm font-medium text-heading hover:shadow-sm hover:border-greeting/40 transition-all active:scale-[0.97] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2" style="opacity:0; animation: fadeInUp 0.4s ease-out forwards; animation-delay: 0.4s">
          <span aria-hidden="true">🌿</span> Vegan
        </button>
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-white border border-border rounded-full text-sm font-medium text-heading hover:shadow-sm hover:border-greeting/40 transition-all active:scale-[0.97] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2" style="opacity:0; animation: fadeInUp 0.4s ease-out forwards; animation-delay: 0.5s">
          <span aria-hidden="true">⏱️</span> 15 min
        </button>
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-white border border-border rounded-full text-sm font-medium text-heading hover:shadow-sm hover:border-greeting/40 transition-all active:scale-[0.97] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2" style="opacity:0; animation: fadeInUp 0.4s ease-out forwards; animation-delay: 0.6s">
          <span aria-hidden="true">✨</span> Surprise me
        </button>
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-white border border-border rounded-full text-sm font-medium text-heading hover:shadow-sm hover:border-greeting/40 transition-all active:scale-[0.97] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2" style="opacity:0; animation: fadeInUp 0.4s ease-out forwards; animation-delay: 0.7s">
          <span aria-hidden="true">🥡</span> Use my leftovers
        </button>
      </nav>

    </main>

    <!-- Bottom Input Bar -->
    <footer class="sticky bottom-0 bg-cream px-4 pb-8 pt-4">
      <form role="search">
      <div class="flex items-center gap-2 bg-white border border-border rounded-full px-4 py-2.5 shadow-sm focus-within:ring-2 focus-within:ring-[#2D5A3D]/50 focus-within:border-[#2D5A3D]/30">
        <!-- Input Field -->
        <input
          type="text"
          placeholder="Ask Gemini"
          aria-label="Ask Gemini"
          autocomplete="off"
          class="flex-1 bg-transparent text-sm text-heading placeholder:text-muted/80 outline-none min-w-0 disabled:opacity-50 disabled:cursor-not-allowed"
        >

        <!-- Search Toggle -->
        <button type="button" aria-label="Toggle search mode" class="h-11 w-11 inline-flex items-center justify-center text-muted hover:text-heading transition-colors active:scale-95 flex-shrink-0 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2D5A3D]/50 focus-visible:ring-offset-2 rounded-full">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
      </form>
    </footer>

  </div>

</body>
</html>
